<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Webcom Sirsa</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Masonry Grid */
        .masonry-grid {
            column-count: 3;
            column-gap: 20px;
        }

        @media (max-width: 991px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 767px) { .masonry-grid { column-count: 1; } }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s var(--apple-spring), box-shadow 0.4s;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .masonry-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.3);
        }

        .masonry-item:hover img {
            transform: scale(1.05);
        }

        .masonry-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            transition: opacity 0.4s;
        }

        .masonry-item:hover .masonry-overlay {
            opacity: 1;
        }

        /* Cinematic Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--apple-ease);
        }

        #lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: scale(0.9);
            transition: transform 0.5s var(--apple-spring);
        }

        #lightbox.active #lightbox-img {
            transform: scale(1);
        }

        #lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: none;
            transition: all 0.3s;
        }

        #lightbox-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">WEBCOM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <a href="login.html" class="btn ms-lg-3 rounded-pill px-4 fw-bold" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px);">
                    <i class="fa-solid fa-lock me-1"></i> Admin
                </a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" style="height:50vh;">
        <div class="container hero-content text-center">
            <span class="hero-badge reveal">Memories & Milestones</span>
            <h1 class="reveal reveal-delay-1">Our Student Gallery</h1>
            <p class="reveal reveal-delay-2">Success stories, seminars, workshops & classroom moments.</p>
        </div>
    </section>

    <!-- DYNAMIC MASONRY GALLERY -->
    <section class="py-5" style="min-height: 50vh;">
        <div class="container">
            <div id="loadingIndicator" class="text-center text-muted py-5">
                <i class="fa-solid fa-circle-notch fa-spin fs-2 mb-3"></i>
                <p>Loading gallery from secure cloud...</p>
            </div>
            
            <div class="masonry-grid" id="galleryContainer">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer mt-5">
        <div class="container text-center">
            <h3>Webcom Sirsa</h3>
            <p>Premium IELTS • PTE • Spoken English Institute</p>
        </div>
    
        <div class="container mt-4 pt-4 border-top" style="border-color: rgba(255,255,255,0.1) !important;">
            <p class="text-center text-muted mb-0" style="font-size: 14px; font-weight: 300;">
                Designed & Developed by <strong style="color: #38bdf8; font-weight: 600;">Navraj Sandhu</strong>
            </p>
        </div>
</footer>

    <!-- CINEMATIC LIGHTBOX MODAL -->
    <div id="lightbox">
        <button id="lightbox-close"><i class="fa-solid fa-times"></i></button>
        <img id="lightbox-img" src="" alt="Full Screen Image">
    </div>

    <!-- JS -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                            ? 'http://localhost:5000/api' : 'https://webcom-sirsa.onrender.com/api';
            
            const container = document.getElementById('galleryContainer');
            const loading = document.getElementById('loadingIndicator');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('lightbox-close');

            // 1. Fetch Dynamic Data
            try {
                const res = await fetch(`${API_BASE}/data`);
                const data = await res.json();
                
                loading.style.display = 'none';

                // 2. Render Masonry Grid
                data.gallery.forEach((imgObj, index) => {
                    const delay = (index % 5) + 1; // max delay 5 for reveal
                    const BACKEND_URL = API_BASE.replace('/api', '');
                    const photoUrl = imgObj.url ? (imgObj.url.startsWith('http') ? imgObj.url : BACKEND_URL + imgObj.url) : '';
                    const itemHtml = `
                        <div class="masonry-item reveal reveal-delay-${delay}" data-img="${photoUrl}">
                            <img src="${photoUrl}" alt="Gallery Image ${imgObj.id}">
                            <div class="masonry-overlay">
                                <h5 class="text-white m-0 fw-bold"><i class="fa-solid fa-expand me-2 text-info"></i>View Image</h5>
                            </div>
                        </div>
                    `;
                    container.innerHTML += itemHtml;
                });

                // 3. Attach Lightbox Events
                const items = document.querySelectorAll('.masonry-item');
                items.forEach(item => {
                    item.addEventListener('click', () => {
                        const url = item.getAttribute('data-img');
                        lightboxImg.src = url;
                        lightbox.classList.add('active');
                    });
                });

            } catch(e) {
                console.error("Failed to load gallery", e);
                loading.innerHTML = "<p class='text-danger'>Failed to load gallery images.</p>";
            }

            // Lightbox close logic
            closeBtn.addEventListener('click', () => lightbox.classList.remove('active'));
            lightbox.addEventListener('click', (e) => {
                if(e.target === lightbox) lightbox.classList.remove('active');
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
