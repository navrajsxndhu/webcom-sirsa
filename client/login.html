<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Login | Webcom Sirsa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #020617;
            overflow: hidden;
            position: relative;
        }

        /* Animated Blobs */
        .login-blobs {
            position: absolute;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.2;
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; left: -100px; }
        .blob-2 { width: 300px; height: 300px; background: #c084fc; bottom: -50px; right: -50px; animation-delay: -5s; }
        
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.3), transparent, rgba(192, 132, 252, 0.3));
            border-radius: 32px;
            z-index: -1;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 30px;
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .login-card h2 { font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; }
        .login-card p { color: #94a3b8; margin-bottom: 35px; font-weight: 500; }

        .form-floating > .form-control {
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            border-radius: 16px;
            padding: 18px 16px;
            height: 64px;
        }

        .form-floating > label { color: #64748b; padding-left: 16px; }

        .form-control:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1) !important;
        }

        .pass-container { position: relative; }
        .pass-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            z-index: 10;
            transition: color 0.3s;
        }
        .pass-toggle:hover { color: #fff; }

        .forgot-link {
            display: block;
            text-align: right;
            margin-top: -10px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #38bdf8;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
        .forgot-link:hover { color: #7dd3fc; text-decoration: underline; }

        .login-btn {
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            transition: all 0.3s var(--apple-ease);
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4); }

        .back-link {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            margin-top: 30px;
            display: inline-block;
            transition: color 0.3s;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="login-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="logo-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2>Secure Login</h2>
        <p>Welcome back, Director</p>

        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
                <label for="username">Username</label>
            </div>
            
            <div class="pass-container mb-3">
                <div class="form-floating">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <label for="password">Password</label>
                </div>
                <button type="button" class="pass-toggle" id="togglePass">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>

            <a href="#" class="forgot-link" id="forgotPass">Forgot Password?</a>
            
            <button type="submit" id="loginBtn" class="btn btn-primary w-100 login-btn">
                Access Dashboard <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </form>

        <a href="index.html" class="back-link text-decoration-none">
            <i class="fa-solid fa-arrow-left me-2"></i> Back to Website
        </a>
    </div>

    <script src="script.js"></script>
    <script src="login.js"></script>
    <script>
        // Toggle Password Visibility
        const toggleBtn = document.getElementById('togglePass');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            toggleBtn.innerHTML = type === 'password' ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
        });

        // Forgot Password Action
        document.getElementById('forgotPass').addEventListener('click', (e) => {
            e.preventDefault();
            showToast('Helpful Tip', 'To reset your master credentials, please contact Navraj Sandhu or update your server environment variables.', 'info');
        });
    </script>
</body>
</html>
