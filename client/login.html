<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Login | Webcom</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: slideUp 0.6s var(--apple-ease) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h2 {
            font-weight: 800;
            margin-bottom: 5px;
        }

        .login-card p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.3s var(--apple-ease);
        }

        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
            color: white;
        }

        .form-control::placeholder {
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Webcom CMS</h2>
        <p>Director Sign In</p>

        <form id="loginForm">
            <input type="text" id="username" class="form-control" placeholder="Username" required>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            
            <button type="submit" id="loginBtn" class="btn btn-primary w-100 mt-3" style="padding: 16px;">
                Sign In
            </button>
        </form>

        <a href="index.html" class="d-block mt-4 text-decoration-none" style="color: #64748b; font-size: 14px;">
            <i class="fa-solid fa-arrow-left me-1"></i> Back to Website
        </a>
    </div>

    <!-- Shared JS (includes showToast) -->
    <script src="script.js"></script>
    <script src="login.js"></script>
</body>
</html>
