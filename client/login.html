<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Login | Webcom Sirsa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #020617;
            overflow-y: auto;
            padding: 40px 20px;
            position: relative;
        }

        /* Enhanced Animated Blobs */
        .login-blobs {
            position: absolute;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            filter: blur(100px);
            opacity: 0.25;
            border-radius: 50%;
            animation: float 25s infinite alternate ease-in-out;
        }
        .blob-1 { width: 500px; height: 500px; background: #0ea5e9; top: -150px; left: -150px; }
        .blob-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -100px; animation-delay: -7s; }
        .blob-3 { width: 300px; height: 300px; background: #ec4899; top: 40%; right: 10%; animation-delay: -12s; }
        
        @keyframes float {
            0% { transform: translate(0,0) scale(1) rotate(0deg); }
            100% { transform: translate(120px, 80px) scale(1.2) rotate(45deg); }
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 60px 45px;
            border-radius: 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
            animation: slideIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-card .logo-shield {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 36px;
            color: white;
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
            transform: rotate(-5deg);
            transition: all 0.5s var(--apple-spring);
        }

        .login-card:hover .logo-shield { transform: rotate(0deg) scale(1.1); }

        .login-card h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; font-size: 2.2rem; }
        .login-card p { color: #94a3b8; margin-bottom: 40px; font-weight: 500; font-size: 1.1rem; }

        .form-floating > .form-control {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            border-radius: 18px;
            padding: 20px 24px;
            height: 70px;
            font-size: 1.1rem;
        }

        .form-floating > label { color: #64748b; padding-left: 24px; }

        .form-control:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 5px rgba(56, 189, 248, 0.15) !important;
            background: rgba(0,0,0,0.4) !important;
        }

        .pass-container { position: relative; }
        .pass-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            z-index: 10;
            padding: 8px;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .pass-toggle:hover { color: #38bdf8; }

        .forgot-link {
            display: inline-block;
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #38bdf8;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            opacity: 0.8;
        }
        .forgot-link:hover { opacity: 1; color: #7dd3fc; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }

        .login-btn {
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border: none;
            border-radius: 18px;
            padding: 18px;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
            transition: all 0.4s var(--apple-ease);
        }
        .login-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.5); 
            filter: brightness(1.1);
        }

        .back-link {
            color: #475569;
            font-size: 15px;
            font-weight: 600;
            margin-top: 40px;
            display: inline-block;
            transition: all 0.3s;
        }
        .back-link:hover { color: #fff; transform: translateX(-5px); }
        
        /* Error Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div class="login-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="logo-shield">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <!-- LOGIN VIEW -->
        <div id="loginView">
            <h2>Director Login</h2>
            <p>Access the master dashboard</p>

            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="text" id="username" class="form-control" placeholder="Username" required autocomplete="username">
                    <label for="username">Username</label>
                </div>
                
                <div class="pass-container mb-2">
                    <div class="form-floating">
                        <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password">
                        <label for="password">Password</label>
                    </div>
                    <button type="button" class="pass-toggle" id="togglePass">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <div class="text-end mb-4">
                    <a href="#" class="forgot-link" id="forgotPass">Forgot Access?</a>
                </div>
                
                <button type="submit" id="loginBtn" class="btn btn-primary w-100 login-btn">
                    Authorize Access <i class="fa-solid fa-key ms-2"></i>
                </button>
            </form>
        </div>

        <!-- RECOVERY VIEW (Hidden by default) -->
        <div id="recoveryView" style="display: none;">
            <h2>Reset Access</h2>
            <p>Enter your Master Recovery Key</p>

            <form id="recoveryForm">
                <div class="form-floating mb-3">
                    <input type="text" id="recoveryKeyInput" class="form-control" placeholder="Recovery Key" required>
                    <label for="recoveryKeyInput">Master Recovery Key</label>
                </div>
                
                <div class="form-floating mb-3">
                    <input type="text" id="newUsername" class="form-control" placeholder="New Username" required>
                    <label for="newUsername">New Username</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" id="newPassword" class="form-control" placeholder="New Password" required>
                    <label for="newPassword">New Password</label>
                </div>
                
                <button type="submit" id="resetBtn" class="btn btn-primary w-100 login-btn">
                    Reset Credentials <i class="fa-solid fa-rotate ms-2"></i>
                </button>

                <a href="#" class="back-link mt-4" id="cancelRecovery">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Login
                </a>
            </form>
        </div>

        <a href="index.html" class="back-link text-decoration-none" id="returnToSiteLink">
            <i class="fa-solid fa-arrow-left me-2"></i> Return to Site
        </a>
    </div>

    <script src="script.js"></script>
    <script src="login.js"></script>
    <script>
        // Toggle views
        const loginView = document.getElementById('loginView');
        const recoveryView = document.getElementById('recoveryView');
        const returnLink = document.getElementById('returnToSiteLink');

        document.getElementById('forgotPass').addEventListener('click', (e) => {
            e.preventDefault();
            loginView.style.display = 'none';
            recoveryView.style.display = 'block';
            returnLink.style.display = 'none';
        });

        document.getElementById('cancelRecovery').addEventListener('click', (e) => {
            e.preventDefault();
            loginView.style.display = 'block';
            recoveryView.style.display = 'none';
            returnLink.style.display = 'inline-block';
        });

        // Recovery Form Submission
        const recoveryForm = document.getElementById('recoveryForm');
        const resetBtn = document.getElementById('resetBtn');

        recoveryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const recoveryKey = document.getElementById('recoveryKeyInput').value;
            const newUsername = document.getElementById('newUsername').value;
            const newPassword = document.getElementById('newPassword').value;

            const originalText = resetBtn.innerHTML;
            resetBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Resetting...';
            resetBtn.disabled = true;

            try {
                const apiUrl = (window.WEBCOM_API || (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                                ? 'http://localhost:5000/api' : 'https://webcom-sirsa.onrender.com/api')) + '/reset-with-key';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recoveryKey, newUsername, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('Success', 'Access restored! You can now login with your new credentials.', 'success');
                    recoveryForm.reset();
                    // Switch back to login
                    loginView.style.display = 'block';
                    recoveryView.style.display = 'none';
                    returnLink.style.display = 'inline-block';
                } else {
                    showToast('Error', data.error || 'Reset failed.', 'error');
                    if (window.shakeLoginCard) window.shakeLoginCard();
                }
            } catch (error) {
                showToast('Error', 'Server connection failed.', 'error');
            } finally {
                resetBtn.innerHTML = originalText;
                resetBtn.disabled = false;
            }
        });

        // Toggle Password Visibility
        const toggleBtn = document.getElementById('togglePass');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            toggleBtn.innerHTML = type === 'password' ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
        });

        // Add shake on failed attempt
        window.shakeLoginCard = () => {
            const card = document.getElementById('loginCard');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
        };
    </script>
</body>
</html>
