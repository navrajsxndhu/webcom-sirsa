<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Login | Webcom Sirsa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=1.1">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #020617;
            overflow-y: auto;
            padding: 40px 20px;
            position: relative;
        }

        /* Enhanced Animated Blobs */
        .login-blobs {
            position: absolute;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            filter: blur(100px);
            opacity: 0.25;
            border-radius: 50%;
            animation: float 25s infinite alternate ease-in-out;
        }
        .blob-1 { width: 500px; height: 500px; background: #0ea5e9; top: -150px; left: -150px; }
        .blob-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -100px; animation-delay: -7s; }
        .blob-3 { width: 300px; height: 300px; background: #ec4899; top: 40%; right: 10%; animation-delay: -12s; }
        
        @keyframes float {
            0% { transform: translate(0,0) scale(1) rotate(0deg); }
            100% { transform: translate(120px, 80px) scale(1.2) rotate(45deg); }
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 60px 45px;
            border-radius: 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
            animation: slideIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards, cardPulse 8s infinite alternate;
            position: relative;
            overflow: hidden;
        }

        /* Continuous Card Shimmer */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 45%,
                rgba(255, 255, 255, 0.03) 50%,
                transparent 55%
            );
            animation: cardShimmer 10s infinite linear;
            pointer-events: none;
        }

        @keyframes cardShimmer {
            from { transform: translateX(-10%) translateY(-10%); }
            to { transform: translateX(10%) translateY(10%); }
        }

        @keyframes cardPulse {
            from { box-shadow: 0 50px 100px rgba(0,0,0,0.6), 0 0 0 rgba(56, 189, 248, 0); }
            to { box-shadow: 0 50px 100px rgba(0,0,0,0.6), 0 0 40px rgba(56, 189, 248, 0.1); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-card .logo-shield {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 35px;
            font-size: 40px;
            color: white;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4);
            animation: float3D 6s infinite ease-in-out;
            transform-style: preserve-3d;
        }

        @keyframes float3D {
            0%, 100% { transform: translateY(0) rotateY(-10deg) rotateX(5deg); }
            50% { transform: translateY(-15px) rotateY(15deg) rotateX(-10deg); }
        }

        .login-card h2 { font-weight: 900; letter-spacing: -1.5px; margin-bottom: 12px; font-size: 2.4rem; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-card p { color: #64748b; margin-bottom: 45px; font-weight: 500; font-size: 1.1rem; letter-spacing: 0.5px; }

        .form-floating > .form-control {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            color: white !important;
            border-radius: 20px;
            padding: 20px 24px;
            height: 75px;
            font-size: 1.15rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-floating > label { color: #475569; padding-left: 24px; transition: all 0.3s; }

        .form-control:focus {
            border-color: rgba(56, 189, 248, 0.5) !important;
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.5), 0 0 30px rgba(56, 189, 248, 0.1) !important;
            background: rgba(0,0,0,0.5) !important;
            transform: translateY(-2px);
        }

        .form-control:focus + label { color: #38bdf8 !important; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }

        .pass-container { position: relative; }
        .pass-toggle {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #475569;
            z-index: 10;
            padding: 10px;
            font-size: 1.3rem;
            transition: all 0.3s;
        }
        .pass-toggle:hover { color: #38bdf8; transform: translateY(-50%) scale(1.1); }

        .login-btn {
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border: none;
            border-radius: 18px;
            padding: 18px;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3);
            transition: all 0.4s var(--apple-ease);
            position: relative;
            overflow: hidden;
        }
        .login-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .login-btn:hover::after {
            left: 100%;
            transition: 0.6s;
        }
        .login-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.5); 
            filter: brightness(1.1);
        }

        .back-link {
            color: #475569;
            font-size: 15px;
            font-weight: 600;
            margin-top: 40px;
            display: inline-block;
            transition: all 0.3s;
        }
        .back-link:hover { color: #fff; transform: translateX(-5px); }
        
        .forgot-btn-premium {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s var(--apple-ease);
            display: inline-flex;
            align-items: center;
        }
        .forgot-btn-premium:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.15);
        }

        /* Error Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div class="login-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-card" id="loginCard">
        <div class="logo-shield">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <!-- LOGIN VIEW -->
        <div id="loginView">
            <h2>Director Login</h2>
            <p>Access the master dashboard</p>

            <form id="loginForm">
                <div class="form-floating mb-3">
                    <input type="text" id="username" class="form-control" placeholder="Username" required autocomplete="username">
                    <label for="username">Username</label>
                </div>
                
                <div class="pass-container mb-2">
                    <div class="form-floating">
                        <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password">
                        <label for="password">Password</label>
                    </div>
                    <button type="button" class="pass-toggle" id="togglePass">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" style="background-color: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);">
                        <label class="form-check-label text-muted small" for="rememberMe">Remember</label>
                    </div>
                    <a href="#" id="forgotBtn" class="forgot-btn-premium">
                        <i class="fa-solid fa-circle-question me-1"></i> Forgot Access?
                    </a>
                </div>
                
                <button type="submit" id="loginBtn" class="btn btn-primary w-100 login-btn">
                    Authorize Access <i class="fa-solid fa-key ms-2"></i>
                </button>
            </form>
        </div>

        <!-- RECOVERY VIEW -->
        <div id="recoverView" style="display: none;">
            <h2 class="text-warning"><i class="fa-solid fa-life-ring me-2"></i>Recovery Mode</h2>
            <p>Use your master key to reset access.</p>

            <form id="recoverForm">
                <div class="form-floating mb-3">
                    <input type="text" id="recoverKey" class="form-control" placeholder="Master Recovery Key" required>
                    <label for="recoverKey">Master Recovery Key</label>
                </div>
                
                <hr class="border-secondary opacity-25 my-4">

                <div class="form-floating mb-3">
                    <input type="text" id="resetUser" class="form-control" placeholder="New Username" required>
                    <label for="resetUser">New Username</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" id="resetPass" class="form-control" placeholder="New Password" required minlength="6">
                    <label for="resetPass">New Password</label>
                </div>
                
                <button type="submit" id="recoverBtn" class="btn btn-warning w-100 login-btn" style="background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 15px 30px rgba(245, 158, 11, 0.3);">
                    Reset Credentials <i class="fa-solid fa-rotate ms-2"></i>
                </button>

                <div class="mt-4">
                    <a href="#" id="backToLogin" class="text-muted small text-decoration-none" style="font-weight: 600;"><i class="fa-solid fa-arrow-left me-1"></i> Back to Login</a>
                </div>
            </form>
        </div>

        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left me-2"></i> Return to Main Website
        </a>
    </div>

    <script src="script.js"></script>
    <script src="login.js"></script>
    <script>


        // Toggle Password Visibility
        const toggleBtn = document.getElementById('togglePass');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            toggleBtn.innerHTML = type === 'password' ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
        });

        // Add shake on failed attempt
        window.shakeLoginCard = () => {
            const card = document.getElementById('loginCard');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
        };
    </script>
</body>
</html>
