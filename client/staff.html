<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Staff | Webcom Sirsa</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .staff-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            overflow: hidden;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .staff-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 10;
        }

        .staff-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(56, 189, 248, 0.2);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .staff-card:hover::before {
            opacity: 1;
        }

        .staff-photo-container {
            width: 100%;
            height: 320px;
            position: relative;
            overflow: hidden;
        }

        .staff-photo-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(15, 23, 42, 1), transparent);
            z-index: 1;
        }

        .staff-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .staff-card:hover .staff-photo-container img {
            transform: scale(1.1) translateY(-5px);
        }

        .staff-social {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s var(--apple-spring);
        }

        .staff-card:hover .staff-social {
            opacity: 1;
            transform: translateY(0);
        }

        .staff-social a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .staff-social a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(1.15);
        }

        .staff-details {
            padding: 0 30px 40px 30px;
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .staff-role-badge {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(129, 140, 248, 0.15));
            color: #38bdf8;
            padding: 8px 20px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-block;
            margin-top: -20px;
            margin-bottom: 20px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .staff-details h3 {
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 12px;
            color: #f8fafc;
        }
        
        .staff-details p {
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.7;
            font-weight: 300;
            margin: 0;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">WEBCOM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link active" href="staff.html">Staff</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <a href="login.html" class="btn ms-lg-3 rounded-pill px-4 fw-bold" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; backdrop-filter: blur(10px);">
                    <i class="fa-solid fa-lock me-1"></i> Admin
                </a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" style="height:50vh;">
        <div class="container hero-content text-center">
            <span class="hero-badge reveal">Expert Trainers</span>
            <h1 class="reveal reveal-delay-1">Meet Our Team</h1>
            <p class="reveal reveal-delay-2">Learn from the best IELTS and PTE certified professionals.</p>
        </div>
    </section>

    <!-- STAFF GRID -->
    <section class="py-5" style="min-height: 50vh;">
        <div class="container">
            <div id="loadingIndicator" class="text-center text-muted py-5">
                <i class="fa-solid fa-circle-notch fa-spin fs-2 mb-3"></i>
                <p>Loading expert team...</p>
            </div>
            
            <div class="row g-4" id="staffContainer">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer mt-5">
        <div class="container text-center">
            <h3>Webcom Sirsa</h3>
            <p>Premium IELTS • PTE • Spoken English Institute</p>
        </div>
    
        <div class="container mt-4 pt-4 border-top" style="border-color: rgba(255,255,255,0.1) !important; padding-bottom: 30px;">
            <div class="d-flex flex-column align-items-center justify-content-center">
                <p class="text-center text-muted mb-2" style="font-size: 14px; font-weight: 300;">
                    Designed & Engineered by <strong style="color: #38bdf8; font-weight: 600; letter-spacing: 0.5px;">Navraj Sandhu</strong>
                </p>
                <div class="d-flex gap-3 mt-1">
                    <a href="https://github.com/navrajsxndhu" target="_blank" style="color: #94a3b8; text-decoration: none; font-size: 18px; transition: color 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#94a3b8'"><i class="fa-brands fa-github"></i></a>
                    <a href="https://instagram.com/navrajsxndhu" target="_blank" style="color: #94a3b8; text-decoration: none; font-size: 18px; transition: color 0.3s;" onmouseover="this.style.color='#E1306C'" onmouseout="this.style.color='#94a3b8'"><i class="fa-brands fa-instagram"></i></a>
                    <a href="mailto:snavraj970@gmail.com" style="color: #94a3b8; text-decoration: none; font-size: 18px; transition: color 0.3s;" onmouseover="this.style.color='#34d399'" onmouseout="this.style.color='#94a3b8'"><i class="fa-solid fa-envelope"></i></a>
                </div>
            </div>
        </div>
</footer>

    <!-- JS -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                            ? 'http://localhost:5000/api' : 'https://webcom-sirsa.onrender.com/api';
            
            try {
                const res = await fetch(`${API_BASE}/data`);
                const data = await res.json();
                
                document.getElementById('loadingIndicator').style.display = 'none';
                const container = document.getElementById('staffContainer');
                
                data.staff.forEach((member, index) => {
                    const delay = (index % 4) + 1;
                    const BACKEND_URL = API_BASE.replace('/api', '');
                    
                    let photoUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(member.name)}&background=1e293b&color=38bdf8&size=512`;
                    if (member.photo) {
                        photoUrl = member.photo.startsWith('http') ? member.photo : BACKEND_URL + member.photo;
                    }

                    const html = `
                        <div class="col-md-6 col-lg-4 d-flex align-items-stretch">
                            <div class="staff-card reveal reveal-delay-${delay} active w-100">
                                <div class="staff-photo-container">
                                    <img src="${photoUrl}" alt="${member.name}">
                                    <div class="staff-social">
                                        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                                        <a href="#"><i class="fa-brands fa-twitter"></i></a>
                                        <a href="mailto:contact@webcomsirsa.com"><i class="fa-solid fa-envelope"></i></a>
                                    </div>
                                </div>
                                <div class="staff-details">
                                    <div><span class="staff-role-badge">${member.role}</span></div>
                                    <h3>${member.name}</h3>
                                    <p>${member.bio}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            } catch(e) {
                console.error("Failed to load staff", e);
                document.getElementById('loadingIndicator').innerHTML = "<p class='text-danger'>Failed to load team members.</p>";
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
