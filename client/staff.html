<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Staff | Webcom Sirsa</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .staff-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            overflow: hidden;
            text-align: center;
            transition: all 0.4s var(--apple-spring);
        }

        .staff-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .staff-photo-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .staff-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s var(--apple-ease);
        }

        .staff-card:hover .staff-photo-container img {
            transform: scale(1.08);
        }

        .staff-details {
            padding: 30px 20px;
        }

        .staff-role-badge {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(129, 140, 248, 0.2));
            color: #38bdf8;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 16px;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">WEBCOM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link active" href="staff.html">Staff</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" style="height:50vh;">
        <div class="container hero-content text-center">
            <span class="hero-badge reveal">Expert Trainers</span>
            <h1 class="reveal reveal-delay-1">Meet Our Team</h1>
            <p class="reveal reveal-delay-2">Learn from the best IELTS and PTE certified professionals.</p>
        </div>
    </section>

    <!-- STAFF GRID -->
    <section class="py-5" style="min-height: 50vh;">
        <div class="container">
            <div id="loadingIndicator" class="text-center text-muted py-5">
                <i class="fa-solid fa-circle-notch fa-spin fs-2 mb-3"></i>
                <p>Loading expert team...</p>
            </div>
            
            <div class="row g-4" id="staffContainer">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer mt-5">
        <div class="container text-center">
            <h3>Webcom Sirsa</h3>
            <p>Premium IELTS • PTE • Spoken English Institute</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                            ? 'http://localhost:5000/api' : 'https://webcom-sirsa.onrender.com/api';
            
            try {
                const res = await fetch(`${API_BASE}/data`);
                const data = await res.json();
                
                document.getElementById('loadingIndicator').style.display = 'none';
                const container = document.getElementById('staffContainer');
                
                data.staff.forEach((member, index) => {
                    const delay = (index % 4) + 1;
                    const BACKEND_URL = API_BASE.replace('/api', '');
                    const photoUrl = member.photo ? (member.photo.startsWith('http') ? member.photo : BACKEND_URL + member.photo) : '';
                    const html = `
                        <div class="col-md-6 col-lg-4">
                            <div class="staff-card reveal reveal-delay-${delay} active">
                                <div class="staff-photo-container">
                                    <img src="${photoUrl}" alt="${member.name}">
                                </div>
                                <div class="staff-details">
                                    <div class="staff-role-badge">${member.role}</div>
                                    <h3 class="fw-bold mb-3">${member.name}</h3>
                                    <p class="text-muted" style="font-size: 15px; line-height: 1.6;">${member.bio}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            } catch(e) {
                console.error("Failed to load staff", e);
                document.getElementById('loadingIndicator').innerHTML = "<p class='text-danger'>Failed to load team members.</p>";
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
